<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Co-op Asteroids: Boss Rush</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; text-shadow: 2px 2px #000; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: 2em; pointer-events: none; }
    </style>
</head>
<body id="body">
    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="wave">Wave: 1</div>
        <div style="font-size: 0.8em; margin-top: 5px;">P1: WASD + Space | P2: Arrows + Enter</div>
    </div>
    <div id="msg"></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const waveEl = document.getElementById('wave');
        const msgEl = document.getElementById('msg');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        let score = 0;
        let wave = 1;
        let gameState = 'playing'; // playing, boss, win, lose
        let entities = { players: [], bullets: [], asteroids: [], particles: [], boss: null, aliens: [], shieldPowerup: null };
        let lastAlienSpawnTime = 0;
        let lastShieldSpawnTime = 0;
        const ALIEN_SPAWN_INTERVAL = 15000; 
        const SHIELD_SPAWN_CHANCE = 0.7; 
        const SHIELD_SPAWN_INTERVAL = 10000;

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = (Math.random() - 0.5) * 5;
                this.life = 1.0;
                this.decay = 0.02 + Math.random() * 0.02;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 2, 2);
                ctx.globalAlpha = 1.0;
            }
        }

        class Bullet {
            constructor(x, y, angle, color, ownerType = 'player') {
                this.x = x; this.y = y; this.angle = angle; this.color = color;
                this.speed = 7;
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
                this.life = 100;
                this.ownerType = ownerType; // 'player', 'alien', 'boss'
            }
            update() { this.x += this.vx; this.y += this.vy; this.life--; this.wrap(); }
            wrap() {
                if (this.x < 0) this.x = canvas.width; if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height; if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Asteroid {
            constructor(x, y, radius, level = 3) {
                this.x = x; this.y = y; this.radius = radius; this.level = level;
                this.angle = Math.random() * Math.PI * 2;
                this.vx = (Math.random() - 0.5) * (4 - level);
                this.vy = (Math.random() - 0.5) * (4 - level);
                this.points = [];
                const vert = 5 + Math.floor(Math.random() * 5);
                for (let i = 0; i < vert; i++) {
                    const r = this.radius * (0.8 + Math.random() * 0.4);
                    const a = (i / vert) * Math.PI * 2;
                    this.points.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
                }
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < -this.radius) this.x = canvas.width + this.radius;
                if (this.x > canvas.width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = canvas.height + this.radius;
                if (this.y > canvas.height + this.radius) this.y = -this.radius;
            }
            draw() {
                ctx.strokeStyle = '#aaa'; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x + this.points[0].x, this.y + this.points[0].y);
                for (let p of this.points) ctx.lineTo(this.x + p.x, this.y + p.y);
                ctx.closePath(); ctx.stroke();
            }
        }

        class ShieldPowerup {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = 15;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = (Math.random() - 0.5) * 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0) this.x = canvas.width; if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height; if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.strokeStyle = '#0f0';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = '#0f0';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('S', this.x, this.y);
            }
        }

        class AlienShip {
            constructor() {
                this.x = Math.random() < 0.5 ? -20 : canvas.width + 20;
                this.y = Math.random() * canvas.height;
                this.radius = 15;
                this.color = '#ffaa00';
                this.angle = Math.random() * Math.PI * 2;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.shootCooldown = 60;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < -this.radius * 2) this.x = canvas.width + this.radius * 2;
                if (this.x > canvas.width + this.radius * 2) this.x = -this.radius * 2;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
                this.angle += 0.05;

                let closestAsteroid = null;
                let minDistAst = Infinity;
                entities.asteroids.forEach(a => {
                    const d = Math.hypot(this.x - a.x, this.y - a.y);
                    if (d < minDistAst) { minDistAst = d; closestAsteroid = a; }
                });

                if (closestAsteroid && minDistAst < 60) {
                    const angleToAst = Math.atan2(closestAsteroid.y - this.y, closestAsteroid.x - this.x);
                    if (Math.random() < 0.5) {
                        this.vx += Math.cos(angleToAst + Math.PI) * 0.1;
                        this.vy += Math.sin(angleToAst + Math.PI) * 0.1;
                    } else {
                        if (this.shootCooldown <= 0) {
                            entities.bullets.push(new Bullet(this.x, this.y, angleToAst, this.color, 'alien'));
                            this.shootCooldown = 30;
                        }
                    }
                }

                this.shootCooldown--;
                if (this.shootCooldown <= 0) {
                    let target = null;
                    let minDist = Infinity;
                    entities.players.forEach(p => {
                        const d = Math.hypot(p.x - this.x, p.y - this.y);
                        if (d < minDist) { minDist = d; target = p; }
                    });

                    if (target && minDist < 400) {
                        const angleToPlayer = Math.atan2(target.y - this.y, target.x - this.x);
                        entities.bullets.push(new Bullet(this.x, this.y, angleToPlayer, this.color, 'alien'));
                        this.shootCooldown = 80 + Math.random() * 40;
                    } else {
                        this.shootCooldown = 60;
                    }
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.strokeStyle = this.color; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(15, 0); ctx.lineTo(-10, 10); ctx.lineTo(-5, 0); ctx.lineTo(-10, -10);
                ctx.closePath(); ctx.stroke();
                ctx.restore();
            }
        }

        class Boss {
            constructor() {
                this.x = canvas.width / 2; this.y = -100;
                this.targetY = canvas.height * 0.2;
                this.radius = 60; this.hp = 50; this.maxHp = 50;
                this.angle = 0; this.vx = 2;
            }
            update() {
                if (this.y < this.targetY) this.y += 2;
                this.x += this.vx;
                if (this.x < this.radius || this.x > canvas.width - this.radius) this.vx *= -1;
                this.angle += 0.02;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 4;
                ctx.strokeRect(-this.radius, -this.radius, this.radius*2, this.radius*2);
                ctx.restore();
                ctx.fillStyle = '#333'; ctx.fillRect(this.x - 50, this.y - 80, 100, 10);
                ctx.fillStyle = '#f00'; ctx.fillRect(this.x - 50, this.y - 80, (this.hp / this.maxHp) * 100, 10);
            }
        }

        class Ship {
            constructor(x, y, color, controls) {
                this.x = x; this.y = y; this.radius = 12; this.color = color;
                this.angle = 0; this.vx = 0; this.vy = 0;
                this.controls = controls; this.friction = 0.98;
                this.shootCooldown = 0;
                this.shieldTime = 0; 
            }
            update() {
                if (keys[this.controls.rotateLeft]) this.angle -= 0.07;
                if (keys[this.controls.rotateRight]) this.angle += 0.07;
                if (keys[this.controls.thrust]) {
                    this.vx += Math.cos(this.angle) * 0.2;
                    this.vy += Math.sin(this.angle) * 0.2;
                }
                this.x += this.vx; this.y += this.vy;
                this.vx *= this.friction; this.vy *= this.friction;
                if (this.x < 0) this.x = canvas.width; if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height; if (this.y > canvas.height) this.y = 0;

                if (this.shootCooldown > 0) this.shootCooldown--;
                if (keys[this.controls.shoot] && this.shootCooldown <= 0) {
                    entities.bullets.push(new Bullet(this.x, this.y, this.angle, this.color, 'player'));
                    this.shootCooldown = 15;
                }

                if (this.shieldTime > 0) {
                    this.shieldTime--;
                }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.strokeStyle = this.color; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(-10, 10); ctx.lineTo(-10, -10); ctx.closePath(); ctx.stroke();
                ctx.restore();

                if (this.shieldTime > 0) {
                    const progress = this.shieldTime / 2400; 
                    let shieldColor = '#00FF00';
                    if (progress < 0.5) {
                        const t = (progress - 0.25) / 0.25;
                        shieldColor = `rgb(${Math.floor(255 * (1-t))}, 255, 0)`;
                    } else {
                        const t = (progress - 0.5) / 0.5;
                        shieldColor = `rgb(255, ${Math.floor(255 * t)}, 0)`;
                    }

                    ctx.beginPath();
                    ctx.strokeStyle = shieldColor;
                    ctx.lineWidth = 3;
                    ctx.arc(this.x, this.y, this.radius + 8, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }

        function spawnWave() {
            const count = 3 + wave * 2;
            for (let i = 0; i < count; i++) {
                let x, y;
                do {
                    x = Math.random() * canvas.width;
                    y = Math.random() * canvas.height;
                } while (Math.hypot(x - canvas.width/2, y - canvas.height/2) < 200);
                entities.asteroids.push(new Asteroid(x, y, 40, 3));
            }
        }

        function explode(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) entities.particles.push(new Particle(x, y, color));
        }

        function init() {
            entities = { players: [], bullets: [], asteroids: [], particles: [], boss: null, aliens: [], shieldPowerup: null };
            entities.players = [
                new Ship(canvas.width * 0.3, canvas.height * 0.5, '#00ffcc', { thrust: 'KeyW', rotateLeft: 'KeyA', rotateRight: 'KeyD', shoot: 'Space' }),
                new Ship(canvas.width * 0.7, canvas.height * 0.5, '#ff00ff', { thrust: 'ArrowUp', rotateLeft: 'ArrowLeft', rotateRight: 'ArrowRight', shoot: 'Enter' })
            ];
            spawnWave();
            gameState = 'playing';
            score = 0; wave = 1;
            scoreEl.innerText = `Score: ${score}`;
            waveEl.innerText = `Wave: ${wave}`;
            msgEl.innerText = '';
            lastAlienSpawnTime = Date.now();
            lastShieldSpawnTime = Date.now();
        }

        function update() {
            if (gameState !== 'playing' && gameState !== 'boss') return;

            const now = Date.now();

            if (gameState === 'playing' && now - lastAlienSpawnTime > ALIEN_SPAWN_INTERVAL && entities.aliens.length < 3) {
                entities.aliens.push(new AlienShip());
                lastAlienSpawnTime = now;
            }

            if (gameState === 'playing' && !entities.shieldPowerup && now - lastShieldSpawnTime > SHIELD_SPAWN_INTERVAL) {
                if (Math.random() < SHIELD_SPAWN_CHANCE) {
                    entities.shieldPowerup = new ShieldPowerup();
                    lastShieldSpawnTime = now;
                } else {
                    lastShieldSpawnTime = now;
                }
            }

            entities.players.forEach(p => p.update());
            entities.bullets.forEach(b => b.update());
            entities.asteroids.forEach(a => a.update());
            entities.particles.forEach(p => p.update());
            entities.aliens.forEach(al => al.update());
            if (entities.boss) entities.boss.update();
            if (entities.shieldPowerup) entities.shieldPowerup.update();

            if (entities.shieldPowerup) {
                entities.players.forEach(p => {
                    if (Math.hypot(p.x - entities.shieldPowerup.x, p.y - entities.shieldPowerup.y) < p.radius + entities.shieldPowerup.radius) {
                        p.shieldTime = 2400; 
                        explode(p.x, p.y, '#0f0', 20);
                        entities.shieldPowerup = null;
                        score += 50;
                        scoreEl.innerText = `Score: ${score}`;
                    }
                });
            }

            entities.bullets.forEach((b, bi) => {
                if (b.ownerType === 'player') {
                    entities.asteroids.forEach((a, ai) => {
                        if (Math.hypot(b.x - a.x, b.y - a.y) < a.radius) {
                            explode(a.x, a.y, '#aaa');
                            entities.bullets.splice(bi, 1);
                            if (a.level > 1) {
                                entities.asteroids.push(new Asteroid(a.x, a.y, a.radius / 2, a.level - 1));
                                entities.asteroids.push(new Asteroid(a.x, a.y, a.radius / 2, a.level - 1));
                            }
                            entities.asteroids.splice(ai, 1);
                            score += 10 * a.level;
                            scoreEl.innerText = `Score: ${score}`;
                        }
                    });
                }
                
                if (b.ownerType === 'player' && entities.boss && Math.hypot(b.x - entities.boss.x, b.y - entities.boss.y) < entities.boss.radius) {
                    entities.bullets.splice(bi, 1);
                    entities.boss.hp--;
                    explode(b.x, b.y, '#f00', 3);
                    if (entities.boss.hp <= 0) {
                        explode(entities.boss.x, entities.boss.y, '#ff0', 50);
                        entities.boss = null;
                        score += 1000;
                        scoreEl.innerText = `Score: ${score}`;
                        gameState = 'win';
                        msgEl.innerText = 'VICTORY!';
                        setTimeout(init, 3000);
                    }
                }

                if (b.ownerType === 'alien') {
                    entities.players.forEach(p => {
                        if (Math.hypot(b.x - p.x, b.y - p.y) < p.radius) {
                            if (p.shieldTime > 0) {
                                // Shield takes 5s damage
                                p.shieldTime = Math.max(0, p.shieldTime - (5 * 60));
                                entities.bullets.splice(bi, 1);
                                explode(p.x, p.y, '#fff', 5);
                            } else {
                                entities.bullets.splice(bi, 1);
                                explode(p.x, p.y, p.color, 20);
                                gameState = 'lose';
                                msgEl.innerText = 'GAME OVER';
                                setTimeout(init, 3000);
                            }
                        }
                    });
                }
            });

            entities.bullets.forEach((b, bi) => {
                if (b.ownerType === 'player') {
                    entities.aliens.forEach((al, ai) => {
                        if (Math.hypot(b.x - al.x, b.y - al.y) < al.radius) {
                            entities.bullets.splice(bi, 1);
                            explode(al.x, al.y, al.color, 15);
                            entities.aliens.splice(ai, 1);
                            score += 100;
                            scoreEl.innerText = `Score: ${score}`;
                        }
                    });
                }
            });

            entities.aliens.forEach((al, ai) => {
                // Collision: Alien Ship vs Asteroid (CRASH!)
                entities.asteroids.forEach((a, ai2) => {
                    if (Math.hypot(al.x - a.x, al.y - a.y) < al.radius + a.radius) {
                        explode(al.x, al.y, al.color, 20);
                        entities.aliens.splice(ai, 1);
                        entities.asteroids.splice(ai2, 1);
                        score += 100;
                        scoreEl.innerText = `Score: ${score}`;
                    }
                });

                // Collision: Alien Ship vs Player
                entities.players.forEach(p => {
                    if (Math.hypot(al.x - p.x, al.y - p.y) < al.radius + p.radius) {
                        if (p.shieldTime > 0) {
                            // Shield takes 10s damage
                            p.shieldTime = Math.max(0, p.shieldTime - (10 * 60));
                            explode(al.x, al.y, al.color, 20);
                            entities.aliens.splice(ai, 1);
                            score += 100;
                            scoreEl.innerText = `Score: ${score}`;
                        } else {
                            explode(p.x, p.y, p.color, 20);
                            gameState = 'lose';
                            msgEl.innerText = 'GAME OVER';
                            setTimeout(init, 3000);
                        }
                    }
                });
            });

            // Collision: Players vs Asteroids
            entities.players.forEach(p => {
                entities.asteroids.forEach(a => {
                    if (Math.hypot(p.x - a.x, p.y - a.y) < a.radius + p.radius) {
                        if (p.shieldTime > 0) {
                            explode(a.x, a.y, '#aaa');
                            entities.asteroids.splice(entities.asteroids.indexOf(a), 1);
                            score += 10 * a.level;
                            scoreEl.innerText = `Score: ${score}`;
                        } else {
                            explode(p.x, p.y, p.color, 20);
                            gameState = 'lose';
                            msgEl.innerText = 'GAME OVER';
                            setTimeout(init, 3000);
                        }
                    }
                });
            });

            if (entities.asteroids.length === 0 && entities.aliens.length === 0 && gameState === 'playing') {
                if (wave % 3 === 0) {
                    gameState = 'boss';
                    entities.boss = new Boss();
                    msgEl.innerText = 'BOSS APPEARS!';
                    setTimeout(() => msgEl.innerText = '', 2000);
                } else {
                    wave++;
                    waveEl.innerText = `Wave: ${wave}`;
                    spawnWave();
                }
            }

            entities.bullets = entities.bullets.filter(b => b.life > 0);
            entities.particles = entities.particles.filter(p => p.life > 0);
        }

        function draw() {
            ctx.fillStyle = 'black'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            entities.particles.forEach(p => p.draw());
            entities.bullets.forEach(b => b.draw());
            entities.asteroids.forEach(a => a.draw());
            entities.aliens.forEach(al => al.draw());
            if (entities.shieldPowerup) entities.shieldPowerup.draw();
            entities.players.forEach(p => p.draw());
            if (entities.boss) entities.boss.draw();
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }

        init();
        loop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
